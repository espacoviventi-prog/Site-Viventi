<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Espaço Viventi — Wireframes da Landing</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { -webkit-font-smoothing: antialiased; }
</style>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#FAF6F0"/>
    <rect x="30" y="30" width="40" height="40" rx="6" fill="none" stroke="#BA7827" stroke-width="3"/>
    <circle cx="50" cy="50" r="6" fill="#6E7E63"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-kit.jsx"></script>
<script type="text/babel" src="wf-sections-1.jsx"></script>
<script type="text/babel" src="wf-sections-2.jsx"></script>

<script type="text/babel">
const { useState } = React;

function WFPage({ v, mode }) {
  return (
    <div className="wf" id={`wf-${v}-${mode}`} style={{ width: '100%' }}>
      <Navbar v={v} mode={mode} />
      <Hero v={v} mode={mode} />
      <Dor v={v} mode={mode} />
      <OQue v={v} mode={mode} />
      <Pilares v={v} mode={mode} />
      <Servicos v={v} mode={mode} />
      <CentroDia v={v} mode={mode} />
      <Diferenciais v={v} mode={mode} />
      <Depoimentos v={v} mode={mode} />
      <ComoComecar v={v} mode={mode} />
      <Equipe v={v} mode={mode} />
      <FAQ v={v} mode={mode} />
      <CtaFinal v={v} mode={mode} />
      <Rodape v={v} mode={mode} />
      <FloatWhats mode={mode} />
    </div>
  );
}

// heights tuned after measuring rendered content
const HEIGHTS = {
  a: { desktop: 6182, mobile: 8338 },
  b: { desktop: 5750, mobile: 7846 },
  c: { desktop: 6428, mobile: 8058 },
};

const DIRS = [
  { v: 'a', title: 'A · Editorial Clássico', sub: 'Centrado e simétrico — grids equilibrados, muito respiro, kickers ao centro.' },
  { v: 'b', title: 'B · Split / Assimétrico', sub: 'Colunas divididas, rótulos à esquerda, listas com filetes e linhas alternadas.' },
  { v: 'c', title: 'C · Numerado / Bandas', sub: 'Seções introduzidas por número grande, bandas horizontais, índice clínico.' },
];

function App() {
  return (
    <DesignCanvas>
      {DIRS.map(({ v, title, sub }) => (
        <DCSection key={v} id={v} title={title} subtitle={sub}>
          <DCArtboard id={`${v}-desktop`} label="Desktop · 1280" width={1280} height={HEIGHTS[v].desktop}>
            <div style={{ width: '100%', height: '100%', overflow: 'hidden' }}><WFPage v={v} mode="desktop" /></div>
          </DCArtboard>
          <DCArtboard id={`${v}-mobile`} label="Mobile · 390" width={390} height={HEIGHTS[v].mobile}>
            <div style={{ width: '100%', height: '100%', overflow: 'hidden' }}><WFPage v={v} mode="mobile" /></div>
          </DCArtboard>
        </DCSection>
      ))}
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
